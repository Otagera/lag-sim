name: Deploy Server

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'docker-compose.yml'
      - '.github/workflows/deploy-server.yml'
  workflow_dispatch:
    inputs:
      force_all:
        type: boolean
        description: 'Rebuild and deploy all services'
        default: false

env:
  REGISTRY: ghcr.io

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - 'docker-compose.yml'
              - '.github/workflows/deploy-server.yml'

  build-server:
    needs: changes
    if: needs.changes.outputs.server == 'true' || github.event.inputs.force_all == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Lowercase owner
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> $GITHUB_ENV

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lag-sim-server:latest
            ${{ env.REGISTRY }}/${{ env.OWNER }}/lag-sim-server:${{ github.sha }}
          cache-from: type=gha,scope=server
          cache-to: type=gha,scope=server,mode=max

  deploy:
    needs: [build-server]
    if: |
      always() && !failure() && !cancelled() &&
      needs.build-server.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify redeploy
        run: |
          curl -fsSL -X GET "${{ secrets.COOLIFY_WEBHOOK_URL }}" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
